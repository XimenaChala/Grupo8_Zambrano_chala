version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: weatherstack_postgres
    restart: always
    environment:
       POSTGRES_USER: etl_user
       POSTGRES_PASSWORD: etl_pass
       POSTGRES_DB: weatherstack_dw
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
